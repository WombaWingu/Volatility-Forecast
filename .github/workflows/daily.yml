# Daily volatility forecast: run tests, daily pipeline, and cross-sectional.
# Schedule: after market close (e.g. 5 PM ET = 22:00 UTC)
name: Daily

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC = 5 PM ET, Mon–Fri
  workflow_dispatch:          # Allow manual run

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest tests/ -v --tb=short

  daily:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run daily forecast (NVDA)
        run: |
          python volforecast_cli.py daily --ticker NVDA --export --model ridge
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: volatility-signals-${{ github.run_id }}
          path: artifacts/

  cross_sectional:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run cross-sectional
        run: |
          python volforecast_cli.py cross-sectional --tickers "SPY,QQQ,IWM" --export artifacts/cross_sectional/cross_section.csv
      - name: Upload cross-sectional artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cross-sectional-${{ github.run_id }}
          path: artifacts/cross_sectional/
