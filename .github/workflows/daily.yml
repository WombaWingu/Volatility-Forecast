# Daily volatility forecast: run tests, daily pipeline, and cross-sectional.
# Schedule: after market close (e.g. 5 PM ET = 22:00 UTC)
name: Daily

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC = 5 PM ET, Mon–Fri
  workflow_dispatch:          # Allow manual run

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest tests/ -v --tb=short

  daily:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run daily forecast (NVDA)
        run: |
          python volforecast_cli.py daily --ticker NVDA --export --model ridge --equity 100000
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: volatility-signals-${{ github.run_id }}
          path: artifacts/

  paper_trade:
    needs: test
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alpaca-py
      - name: Run daily forecast for ETF universe
        run: |
          DATE=$(date +%Y-%m-%d)
          for TICKER in SPY QQQ IWM XLF XLE GLD TLT VXX; do
            echo "--- Forecasting $TICKER ---"
            python volforecast_cli.py daily --ticker $TICKER --export --model ridge --equity 100000
            # Save per-ticker copies before the next ticker overwrites them
            cp artifacts/signals/$DATE/tomorrow_positions.csv artifacts/signals/$DATE/tomorrow_positions_${TICKER}.csv
            cp artifacts/signals/$DATE/volatility_signals.csv  artifacts/signals/$DATE/volatility_signals_${TICKER}.csv
          done
      - name: Select best ETF by predicted Sharpe
        run: |
          python alpaca_selector.py
      - name: Execute paper trade (rotate to selected ETF)
        run: |
          python alpaca_executor.py
      - name: Upload paper trading artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-trading-orders-${{ github.run_id }}
          path: artifacts/signals/
